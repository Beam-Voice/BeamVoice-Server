name: Release

on:
  push:
    tags:
      - "v*"

# Files/folders to exclude from the zip.
# Dotfiles (.*) are always excluded.
env:
  EXCLUDE_LIST: |
    README.md

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - distro: debian
            version: "12"
          - distro: debian
            version: "13"
          - distro: ubuntu
            version: "22.04"
          - distro: ubuntu
            version: "24.04"

    container:
      image: ${{ matrix.distro }}:${{ matrix.version }}

    steps:
      - name: Install dependencies
        run: apt-get update && apt-get install -y git make gcc liblua5.3-dev zip

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build LuaSocket
        run: |
          git clone --depth 1 https://github.com/lunarmodules/luasocket.git /tmp/luasocket
          cd /tmp/luasocket
          make PLAT=linux LUAV=5.3 LUAINC_linux=/usr/include/lua5.3 linux

      - name: Assemble package
        shell: bash
        run: |
          mkdir -p lib/mime lib/socket
          cp /tmp/luasocket/src/mime-*.so     lib/mime/core.so
          cp /tmp/luasocket/src/socket-*.so   lib/socket/core.so
          cp /tmp/luasocket/src/serial.so         lib/socket/
          cp /tmp/luasocket/src/unix.so           lib/socket/

          EXCLUDE_ARGS="-x '.*' -x '*/.*'"
          while IFS= read -r entry; do
            entry="$(echo "$entry" | xargs)"
            [ -z "$entry" ] && continue
            EXCLUDE_ARGS="$EXCLUDE_ARGS -x '$entry'"
          done <<< "$EXCLUDE_LIST"

          ZIPNAME="BeamVoice-Server-${{ matrix.distro }}-${{ matrix.version }}-x86_64.zip"
          eval zip -r "/tmp/$ZIPNAME" . $EXCLUDE_ARGS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeamVoice-Server-${{ matrix.distro }}-${{ matrix.version }}-x86_64
          path: /tmp/BeamVoice-Server-${{ matrix.distro }}-${{ matrix.version }}-x86_64.zip

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git make zip curl tar
            mingw-w64-x86_64-gcc

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Lua 5.3
        run: |
          # MSYS2 only ships Lua 5.4, so build 5.3 from source for LuaSocket to link against.
          # Use the official lua.org tarball: the GitHub mirror lacks the platform make targets.
          # Build a STATIC liblua.a (without -DLUA_BUILD_AS_DLL) so Lua is linked directly
          # into the LuaSocket DLLs instead of depending on an external lua53.dll:
          # BeamMP-Server embeds Lua statically and ships no lua53.dll alongside the exe.
          curl -sL https://www.lua.org/ftp/lua-5.3.6.tar.gz | tar xz -C /tmp
          cd /tmp/lua-5.3.6/src
          make liblua.a

      - name: Build LuaSocket
        run: |
          git clone --depth 1 https://github.com/lunarmodules/luasocket.git /tmp/luasocket
          cd /tmp/luasocket
          # Link Lua statically (liblua.a) and statically link the MinGW runtime
          # (-static-libgcc -static) so the resulting core DLLs are fully self-contained:
          # no lua53.dll, libgcc_s_seh-1.dll or libwinpthread-1.dll dependency at load time.
          make PLAT=mingw LUAV=5.3 \
            LUAINC_mingw=/tmp/lua-5.3.6/src \
            LUALIB_mingw=/tmp/lua-5.3.6/src/liblua.a \
            MYLDFLAGS="-static-libgcc -static" \
            mingw

      - name: Assemble package
        run: |
          # serial/unix are Unix-only modules; Windows ships only mime + socket cores.
          mkdir -p lib/mime lib/socket
          cp /tmp/luasocket/src/mime-*.dll   lib/mime/core.dll
          cp /tmp/luasocket/src/socket-*.dll lib/socket/core.dll

          ZIPNAME="BeamVoice-Server-windows-x86_64.zip"

          EXCLUDE_ARGS="-x '.*' -x '*/.*' -x \"$ZIPNAME\""
          while IFS= read -r entry; do
            entry="$(echo "$entry" | xargs)"
            [ -z "$entry" ] && continue
            EXCLUDE_ARGS="$EXCLUDE_ARGS -x '$entry'"
          done <<< "$EXCLUDE_LIST"

          eval zip -r "$ZIPNAME" . $EXCLUDE_ARGS

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeamVoice-Server-windows-x86_64
          path: BeamVoice-Server-windows-x86_64.zip

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BeamVoice Server ${{ github.ref_name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          body: |
            Files included in this release are:
            - `BeamVoice-Server-${DISTRO}-${DISTROVERSION}-${ARCH}` for linux builds, for example `BeamVoice-Server-debian-12-x86_64` for the Debian 12 build for x86_64.
            - `BeamVoice-Server-windows-x86_64` for the Windows build (x86_64). You need to install the [Visual C++ Redistributables](https://aka.ms/vs/17/release/vc_redist.x64.exe) to run this.
          files: artifacts/**/*.zip